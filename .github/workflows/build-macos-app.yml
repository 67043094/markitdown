name: Build macOS App

on:
  workflow_dispatch:   # 手动触发

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest   # 关键：使用 macOS 环境

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install markitdown pyinstaller

    - name: Create GUI script
      run: |
        cat > ui.py << 'EOF'
        import sys
        import os
        from pathlib import Path
        from markitdown import MarkItDown
        import tkinter as tk
        from tkinter import filedialog, messagebox, scrolledtext
        
        class MarkItDownGUI:
            def __init__(self, root):
                self.root = root
                self.root.title("MarkItDown 文件转换器")
                self.root.geometry("600x400")
                self.create_widgets()
            def create_widgets(self):
                self.label = tk.Label(self.root, text="点击下方按钮选择文件", bg="lightgray", height=5, font=("Arial", 12))
                self.label.pack(fill=tk.BOTH, expand=True, padx=10, pady=10)
                self.btn_select = tk.Button(self.root, text="选择文件", command=self.select_file, font=("Arial", 11), bg="#4CAF50", fg="white")
                self.btn_select.pack(pady=5)
                self.log_area = scrolledtext.ScrolledText(self.root, height=10, font=("Courier", 10))
                self.log_area.pack(fill=tk.BOTH, expand=True, padx=10, pady=10)
            def select_file(self):
                file_path = filedialog.askopenfilename(title="选择要转换的文件", filetypes=[("所有支持的文件", "*.pdf *.docx *.pptx *.xlsx *.jpg *.png"), ("PDF文件", "*.pdf"), ("所有文件", "*.*")])
                if file_path:
                    self.convert_file(file_path)
            def convert_file(self, file_path):
                try:
                    self.log_area.insert(tk.END, f"🔄 正在转换: {os.path.basename(file_path)}...\n")
                    self.log_area.see(tk.END)
                    self.root.update()
                    md = MarkItDown()
                    result = md.convert(file_path)
                    output_path = Path(file_path).with_suffix('.md')
                    with open(output_path, 'w', encoding='utf-8') as f:
                        f.write(result.text_content)
                    self.log_area.insert(tk.END, f"✅ 转换成功！\n   保存至: {output_path}\n\n")
                    messagebox.showinfo("成功", f"文件转换成功！\n已保存至: {output_path}")
                except Exception as e:
                    self.log_area.insert(tk.END, f"❌ 转换失败: {str(e)}\n\n")
                    messagebox.showerror("错误", f"转换时出错:\n{str(e)}")
        def main():
            if len(sys.argv) > 1:
                file_path = sys.argv[1]
                if os.path.exists(file_path):
                    md = MarkItDown()
                    print(md.convert(file_path).text_content)
                else:
                    print(f"文件不存在: {file_path}")
            else:
                root = tk.Tk()
                MarkItDownGUI(root)
                root.mainloop()
        if __name__ == "__main__":
            main()
        EOF

    - name: Build app with PyInstaller
      run: pyinstaller --onefile --windowed --name "MarkItDown" ui.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: MarkItDown-macOS-app
        path: dist/MarkItDown